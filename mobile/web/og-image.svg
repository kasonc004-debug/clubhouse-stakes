<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#1B3D2C"/>
      <stop offset="0.55" stop-color="#2A5940"/>
      <stop offset="1"   stop-color="#3D7055"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="50%">
      <stop offset="0"   stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1"   stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- decorative circles, very subtle -->
  <circle cx="1100" cy="80"  r="180" fill="#ffffff" fill-opacity="0.04"/>
  <circle cx="100"  cy="540" r="120" fill="#ffffff" fill-opacity="0.04"/>

  <!-- CLUBHOUSE -->
  <text x="600" y="280"
        text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-weight="900"
        font-size="120"
        letter-spacing="14"
        fill="#ffffff">CLUBHOUSE</text>

  <!-- gold rule -->
  <line x1="450" y1="320" x2="750" y2="320" stroke="#C9A84C" stroke-width="3"/>

  <!-- STAKES -->
  <text x="600" y="430"
        text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-weight="900"
        font-size="120"
        letter-spacing="34"
        fill="#C9A84C">STAKES</text>

  <!-- tagline -->
  <text x="600" y="500"
        text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-weight="600"
        font-size="22"
        letter-spacing="11"
        fill="#ffffff" fill-opacity="0.6">PRIZE POOL GOLF</text>

  <!-- footer URL -->
  <text x="600" y="580"
        text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-weight="700"
        font-size="20"
        letter-spacing="6"
        fill="#C9A84C">clubhousestakes.com</text>
</svg>
