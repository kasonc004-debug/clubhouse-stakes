workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.clubhousestakes.app"
    scripts:
      - name: Get Flutter packages
        script: cd mobile && flutter pub get
      - name: Install pods
        script: find . -name "Podfile" -execdir pod install \;
      - name: Build iOS release
        script: |
          cd mobile
          flutter build ios --release --no-codesign
    artifacts:
      - mobile/build/ios/iphoneos/Runner.app

  android-debug:
    name: Android Debug APK (Quick Test)
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: cd mobile && flutter pub get
      - name: Build Android debug APK
        script: |
          cd mobile
          flutter build apk --debug
    artifacts:
      - mobile/build/app/outputs/flutter-apk/app-debug.apk

  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        PACKAGE_NAME: "com.clubhousestakes.app"
    scripts:
      - name: Get Flutter packages
        script: cd mobile && flutter pub get
      - name: Build Android release bundle
        script: |
          cd mobile
          flutter build appbundle --release
    artifacts:
      - mobile/build/app/outputs/bundle/release/*.aab
